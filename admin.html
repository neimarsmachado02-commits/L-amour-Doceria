<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin | L’amour</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background-color: var(--accent);
            color: var(--white);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .sidebar .logo {
            font-size: 1.5rem;
            color: var(--primary);
        }
        .admin-nav {
            list-style: none;
        }
        .admin-nav li {
            margin-bottom: 1rem;
        }
        .admin-nav a {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: var(--transition);
        }
        .admin-nav a:hover {
            color: var(--primary);
        }
        .dashboard-main {
            padding: 3rem;
            background-color: var(--bg);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .stat-card {
            background: var(--white);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .stat-card h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 0.5rem;
        }
        .stat-card .value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .chart-container {
            background: var(--white);
            padding: 2rem;
            border-radius: 25px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
        }
        @media (max-width: 768px) {
            .admin-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="sidebar">
            <div class="logo">L’amour Admin</div>
            <nav>
                <ul class="admin-nav">
                    <li><a href="#" style="color: var(--primary);">Dashboard</a></li>
                    <li><a href="#">Pedidos</a></li>
                    <li><a href="#">Estoque</a></li>
                    <li><a href="index.html">Ver Site</a></li>
                </ul>
            </nav>
        </aside>
        
        <main class="dashboard-main">
            <div class="section-title" style="text-align: left; margin-bottom: 3rem;">
                <h2>Visão Geral do Estoque</h2>
                <p>Monitoramento em tempo real dos seus produtos.</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <h3>Vendas Hoje</h3>
                    <div class="value">R$ 1.250</div>
                </div>
                <div class="stat-card">
                    <h3>Pedidos Pendentes</h3>
                    <div class="value">12</div>
                </div>
                <div class="stat-card">
                    <h3>Nível Geral</h3>
                    <div class="value">85%</div>
                </div>
            </div>

            <div class="chart-container" style="margin-bottom: 3rem;">
                <canvas id="stockChart"></canvas>
            </div>

            <!-- Formulário de Cadastro de Produto -->
            <div class="stat-card" style="max-width: 600px;">
                <h3 style="margin-bottom: 1.5rem;">Cadastrar Novo Produto</h3>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="product-name" style="display:block; margin-bottom:0.5rem; font-size:0.8rem; color:#888;">Nome do Produto</label>
                    <input type="text" id="product-name" placeholder="Ex: Macaron de Lavanda" style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:10px;">
                </div>
                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="product-image-url" style="display:block; margin-bottom:0.5rem; font-size:0.8rem; color:#888;">URL da Imagem</label>
                    <input type="text" id="product-image-url" placeholder="Cole o link da imagem aqui..." style="width:100%; padding:0.8rem; border:1px solid #ddd; border-radius:10px;">
                </div>
                
                <div id="preview-container" style="display:none; margin-top:1.5rem; text-align:center;">
                    <p style="font-size:0.8rem; color:#888; margin-bottom:0.5rem;">Prévia da Imagem:</p>
                    <img id="image-preview" src="" alt="Prévia" style="max-width:100%; max-height:250px; border-radius:15px; box-shadow:0 10px 20px rgba(0,0,0,0.1);">
                </div>

                <button class="btn-primary" style="width:100%; margin-top:1.5rem; padding: 1rem; cursor: pointer;">Cadastrar Produto</button>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="admin.js"></script>
</body>
</html>
